  <line x1="28" y1="18" x2="32" y2="30" stroke="url(#pg1)" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="14" x2="24" y2="30" stroke="url(#pg1)" stroke-width="0.8" opacity="0.3"/>
  <!-- Data nodes -->
  <circle cx="20" cy="14" r="2" fill="#8B5CF6"/>
  <circle cx="28" cy="14" r="2" fill="#3B82F6"/>
  <circle cx="16" cy="36" r="2" fill="#8B5CF6" opacity="0.6"/>
