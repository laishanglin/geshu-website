      <stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Layered platform nodes -->
  <rect x="6" y="30" width="36" height="12" rx="3" fill="url(#pg1)" opacity="0.1"/>
