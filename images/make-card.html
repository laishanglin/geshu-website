<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><title>微信分享卡片</title>
<style>
body{margin:0;display:flex;flex-direction:column;align-items:center;background:#111;color:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
canvas{border:1px solid #333;margin:20px}
button{padding:16px 50px;font-size:18px;background:linear-gradient(135deg,#3B82F6,#06B6D4);color:#fff;border:none;border-radius:50px;cursor:pointer;font-weight:700;margin:10px}
.info{color:#F87171;margin:10px}
</style>
</head>
<body>
<h2 style="margin-top:30px">600×600 正方形 · 预计 50-80KB</h2>
<p class="info">符合微信要求：正方形、&lt;100KB、JPG格式</p>
<canvas id="c" width="600" height="600" style="width:400px;height:400px"></canvas>
<button onclick="download()">下载 share-card.jpg</button>

<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const logo=new Image();
logo.src='logo.png';
logo.onload=draw;

function draw(){
const W=600,H=600;
const bg=ctx.createLinearGradient(0,0,W,H);
bg.addColorStop(0,'#0A1628');bg.addColorStop(0.6,'#0F1D35');bg.addColorStop(1,'#060B14');
ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

const g1=ctx.createRadialGradient(150,100,0,200,200,320);
g1.addColorStop(0,'rgba(59,130,246,0.12)');g1.addColorStop(1,'transparent');
ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);

ctx.strokeStyle='rgba(96,165,250,0.03)';ctx.lineWidth=0.5;
[150,300,450].forEach(y=>{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()});
[150,300,450].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()});

// Logo centered large
if(logo.complete&&logo.naturalWidth>0){
  const lw=240,lh=154,lx=(W-lw)/2,ly=110;
  ctx.drawImage(logo,lx,ly,lw,lh);
}

// Company name
ctx.fillStyle='#FFFFFF';
ctx.font='900 52px "PingFang SC","Microsoft YaHei",sans-serif';
ctx.textAlign='center';
ctx.fillText('格数科技',W/2,320);

ctx.fillStyle='#60A5FA';
ctx.font='400 18px "Inter","PingFang SC",sans-serif';
ctx.fillText('GREE Digital Technology',W/2,358);

const dg=ctx.createLinearGradient(W/2-80,380,W/2+80,380);
dg.addColorStop(0,'#3B82F6');dg.addColorStop(1,'#06B6D4');
ctx.strokeStyle=dg;ctx.lineWidth=2;
ctx.beginPath();ctx.moveTo(W/2-80,380);ctx.lineTo(W/2+80,380);ctx.stroke();

ctx.fillStyle='#CBD5E1';
ctx.font='500 22px "PingFang SC","Microsoft YaHei",sans-serif';
ctx.fillText('格力集团AI原生数字化平台',W/2,430);

ctx.fillStyle='#475569';
ctx.font='400 13px "PingFang SC","Microsoft YaHei",sans-serif';
ctx.fillText('珠海横琴 · 粤澳深度合作区',W/2,470);
ctx.textAlign='start';
}

function download(){
const a=document.createElement('a');
a.download='share-card.jpg';
a.href=c.toDataURL('image/jpeg',0.35);
a.click();
}
</script>
</body>
</html>
