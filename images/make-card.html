<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><title>分享卡片生成器</title>
<style>
body{margin:0;display:flex;flex-direction:column;align-items:center;background:#111;color:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
canvas{border:1px solid #333;margin:20px}
button{padding:14px 40px;font-size:18px;background:linear-gradient(135deg,#3B82F6,#06B6D4);color:#fff;border:none;border-radius:50px;cursor:pointer;font-weight:700;margin:10px 0 30px}
</style>
</head>
<body>
<h2 style="margin-top:30px">分享卡片 (JPEG, &lt;200KB)</h2>
<canvas id="c" width="600" height="315" style="width:600px;height:315px"></canvas>
<button onclick="download()">下载 share-card.jpg</button>

<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const logo=new Image();
logo.src='logo.png';
logo.onload=draw;

function draw(){
const W=600,H=315;
const bg=ctx.createLinearGradient(0,0,W,H);
bg.addColorStop(0,'#0A1628');bg.addColorStop(0.5,'#0F1D35');bg.addColorStop(1,'#060B14');
ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

const g1=ctx.createRadialGradient(100,75,0,100,75,150);
g1.addColorStop(0,'rgba(59,130,246,0.12)');g1.addColorStop(1,'transparent');
ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);

ctx.strokeStyle='rgba(96,165,250,0.04)';ctx.lineWidth=0.5;
[79,158,236].forEach(y=>{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()});
[150,300,450].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()});

if(logo.complete&&logo.naturalWidth>0)ctx.drawImage(logo,50,85,80,51);

ctx.fillStyle='#FFFFFF';ctx.font='900 34px "PingFang SC","Microsoft YaHei",sans-serif';ctx.fillText('格数科技',145,125);
ctx.fillStyle='#60A5FA';ctx.font='400 13px "Inter","PingFang SC",sans-serif';ctx.fillText('GREE Digital Technology',145,150);

const dg=ctx.createLinearGradient(145,165,250,165);
dg.addColorStop(0,'#3B82F6');dg.addColorStop(1,'#06B6D4');
ctx.strokeStyle=dg;ctx.lineWidth=2;
ctx.beginPath();ctx.moveTo(145,165);ctx.lineTo(250,165);ctx.stroke();

ctx.fillStyle='#CBD5E1';ctx.font='600 17px "PingFang SC","Microsoft YaHei",sans-serif';ctx.fillText('格力集团AI原生数字化平台',70,215);

function tag(x,y,w,t,bc,tc){
ctx.beginPath();ctx.moveTo(x+14,y);ctx.lineTo(x+w-14,y);
ctx.quadraticCurveTo(x+w,y,x+w,y+14);ctx.lineTo(x+w,y+28-14);ctx.quadraticCurveTo(x+w,y+28,x+w-14,y+28);
ctx.lineTo(x+14,y+28);ctx.quadraticCurveTo(x,y+28,x,y+28-14);ctx.lineTo(x,y+14);ctx.quadraticCurveTo(x,y,x+14,y);
ctx.closePath();ctx.fillStyle=bc;ctx.fill();ctx.strokeStyle=bc.replace('0.1','0.2');ctx.lineWidth=1;ctx.stroke();
ctx.fillStyle=tc;ctx.font='500 13px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText(t,x+w/2,y+19);ctx.textAlign='start';
}
tag(70,235,120,'企业AI平台','rgba(59,130,246,0.1)','#93C5FD');
tag(200,235,100,'数据智能','rgba(139,92,246,0.1)','#A78BFA');
tag(310,235,100,'数字金融','rgba(6,182,212,0.1)','#22D3EE');

ctx.fillStyle='#030812';ctx.fillRect(0,295,W,20);
ctx.fillStyle='#475569';ctx.font='400 10px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='end';ctx.fillText('珠海横琴 · 粤澳深度合作区',530,309);ctx.textAlign='start';
}

function download(){
const a=document.createElement('a');
a.download='share-card.jpg';
a.href=c.toDataURL('image/jpeg',0.82);
a.click();
}
</script>
</body>
</html>
