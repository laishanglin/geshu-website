<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="ag1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/><stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <!-- AI chip -->
  <rect x="10" y="10" width="28" height="28" rx="5" fill="none" stroke="url(#ag1)" stroke-width="1.8"/>
  <rect x="16" y="16" width="16" height="16" rx="3" fill="url(#ag1)" opacity="0.12"/>
  <!-- Neural connections -->
  <circle cx="24" cy="24" r="3.5" fill="url(#ag1)"/>
  <!-- 4 peripheral nodes -->
  <circle cx="24" cy="12" r="2" fill="#F97316"/>
  <circle cx="24" cy="36" r="2" fill="#EC4899"/>
  <circle cx="12" cy="24" r="2" fill="#F97316"/>
  <circle cx="36" cy="24" r="2" fill="#EC4899"/>
  <!-- Connections to center -->
  <line x1="24" y1="15.5" x2="24" y2="20.5" stroke="url(#ag1)" stroke-width="0.8"/>
  <line x1="24" y1="27.5" x2="24" y2="32.5" stroke="url(#ag1)" stroke-width="0.8"/>
  <line x1="15.5" y1="24" x2="20.5" y2="24" stroke="url(#ag1)" stroke-width="0.8"/>
  <line x1="27.5" y1="24" x2="32.5" y2="24" stroke="url(#ag1)" stroke-width="0.8"/>
  <!-- Corner pins -->
  <circle cx="10" cy="10" r="1.5" fill="#F97316" opacity="0.5"/>
  <circle cx="38" cy="10" r="1.5" fill="#EC4899" opacity="0.5"/>
  <circle cx="10" cy="38" r="1.5" fill="#EC4899" opacity="0.5"/>
  <circle cx="38" cy="38" r="1.5" fill="#F97316" opacity="0.5"/>
</svg>
