<svg width="400" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#2979FF"/>
      <stop offset="100%" stop-color="#651FFF"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#060B14" rx="12"/>
  <!-- Orbiting rings -->
  <ellipse cx="100" cy="100" rx="70" ry="22" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" transform="rotate(-15,100,100)"/>
  <ellipse cx="100" cy="100" rx="70" ry="22" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" transform="rotate(45,100,100)"/>
  <ellipse cx="100" cy="100" rx="55" ry="17" fill="none" stroke="rgba(0,229,255,0.15)" stroke-width="1.5" transform="rotate(-15,100,100)"/>
  <!-- Data nodes -->
  <circle cx="100" cy="62" r="5" fill="url(#g2)" filter="url(#glow2)"/>
  <circle cx="100" cy="138" r="4" fill="url(#g2)" filter="url(#glow2)" opacity="0.6"/>
  <circle cx="55" cy="90" r="3.5" fill="#2979FF" filter="url(#glow2)" opacity="0.5"/>
  <circle cx="145" cy="90" r="4.5" fill="#00E5FF" filter="url(#glow2)" opacity="0.7"/>
  <circle cx="72" cy="115" r="3" fill="#651FFF" filter="url(#glow2)" opacity="0.4"/>
  <circle cx="128" cy="115" r="3" fill="#2979FF" filter="url(#glow2)" opacity="0.5"/>
  <!-- Connecting lines -->
  <line x1="100" y1="62" x2="145" y2="90" stroke="rgba(0,229,255,0.2)" stroke-width="1"/>
  <line x1="100" y1="62" x2="55" y2="90" stroke="rgba(41,121,255,0.2)" stroke-width="1"/>
  <line x1="145" y1="90" x2="128" y2="115" stroke="rgba(0,229,255,0.12)" stroke-width="0.8"/>
  <line x1="55" y1="90" x2="72" y2="115" stroke="rgba(41,121,255,0.12)" stroke-width="0.8"/>
  <line x1="128" y1="115" x2="100" y2="138" stroke="rgba(101,31,255,0.12)" stroke-width="0.8"/>
  <line x1="72" y1="115" x2="100" y2="138" stroke="rgba(101,31,255,0.12)" stroke-width="0.8"/>
</svg>
