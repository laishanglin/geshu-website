<svg width="400" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Negative Space G — 负空间 G -->
  <!-- Solid base block -->
  <rect x="46" y="36" width="108" height="128" rx="10" fill="#1A5FDC"/>
  <!-- Negative circle (outer of g) -->
  <circle cx="100" cy="88" r="30" fill="#FFFFFF"/>
  <!-- Connector -->
  <rect x="70" y="88" width="60" height="46" fill="#FFFFFF"/>
  <!-- Inner counter of g -->
  <circle cx="100" cy="82" r="14" fill="#1A5FDC"/>
  <!-- Descender -->
  <rect x="70" y="118" width="22" height="24" fill="#FFFFFF"/>
  <!-- Clean right edge -->
  <rect x="130" y="60" width="24" height="80" fill="#1A5FDC"/>
  <rect x="144" y="96" width="10" height="44" fill="#FFFFFF"/>
</svg>
